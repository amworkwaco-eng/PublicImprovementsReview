name: Deploy to GitHub Pages (SPA)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      # Install dependencies (works for npm & tries ci first)
      - run: npm ci || npm install

      # Build; supports CRA (build/) and Vite (dist/)
      - run: |
          npm run build || echo "No build script found"
          if [ -d "build" ]; then echo "BUILD_DIR=build" >> $GITHUB_ENV; fi
          if [ -d "dist" ]; then echo "BUILD_DIR=dist" >> $GITHUB_ENV; fi
          if [ -z "$BUILD_DIR" ]; then echo "No build output found"; exit 1; fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./${{ env.BUILD_DIR }}

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
